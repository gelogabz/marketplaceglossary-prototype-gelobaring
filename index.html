<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cloud Marketplace Glossary — Suger</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <header class="controls">
            <div class="controls-inner">
                <div class="search-row">
                    <span class="reviewed-badge">Reviewed May 2026</span>
                    <label for="search" class="sr-only">Search terms</label>
                    <input
                        class="search-bar"
                        type="search"
                        id="search"
                        placeholder="Search terms, definitions… (press / to focus)"
                        autocomplete="off"
                        spellcheck="false"
                    />
                </div>
                <div class="filter-row">
                    <button
                        class="carousel-btn carousel-prev"
                        type="button"
                        aria-label="Scroll filters left"
                    >
                        &#8249;
                    </button>
                    <div
                        id="filterBar"
                        class="filter-bar"
                        role="group"
                        aria-label="Filter by category"
                    ></div>
                    <button
                        class="carousel-btn carousel-next"
                        type="button"
                        aria-label="Scroll filters right"
                    >
                        &#8250;
                    </button>
                    <button
                        class="clear-btn"
                        id="clearBtn"
                        type="button"
                        onclick="clearFilters()"
                    >
                        ✕ Clear
                    </button>
                </div>
            </div>
        </header>

        <nav class="alpha-nav" aria-label="Jump to letter">
            <div class="alpha-nav-inner" id="alpha-nav"></div>
        </nav>

        <button
            class="back-to-top"
            id="backToTop"
            type="button"
            aria-label="Back to top"
        >
            ↑ Top
        </button>

        <main class="body">
            <p class="count" id="count"></p>
            <div id="list"></div>
        </main>

        <script type="module" src="main.js"></script>
    </body>
</html>
