<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Cloud GTM Reference — Suger</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <nav class="topnav" aria-label="Site navigation">
            <div class="topnav-inner">
                <a href="." class="topnav-brand">SUGER<span class="brand-dot">.</span> Cloud GTM Reference</a>
                <div class="topnav-center">
                    <label for="search" class="sr-only">Search terms</label>
                    <input
                        class="search-bar"
                        type="search"
                        id="search"
                        placeholder="Search terms, definitions… (press / to focus)"
                        autocomplete="off"
                        spellcheck="false"
                    />
                </div>
                <div class="topnav-right">
                    <a href="learning-paths/" class="topnav-lp-link">Learning Paths</a>
                    <span class="reviewed-badge">Reviewed May 2026</span>
                </div>
            </div>
        </nav>

        <div class="layout">
            <aside class="sidebar-left" id="sidebarLeft" aria-label="Filter by category">
                <nav class="sidebar-nav">
                    <button class="sidebar-all-btn" id="sidebarAllBtn" type="button">All terms</button>

                    <div class="sidebar-group">
                        <p class="sidebar-group-label">Categories</p>
                        <button class="sidebar-tag-btn" type="button" data-filter-category="fundamentals">Fundamentals</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-category="procurement">Procurement</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-category="cosell">Co-sell</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-category="billing">Billing & Revenue</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-category="operations">Marketplace Ops</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-category="advanced">Advanced GTM</button>
                    </div>

                    <div class="sidebar-group">
                        <p class="sidebar-group-label">Platforms</p>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="aws">AWS</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="azure">Azure</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="gcp">GCP</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="snowflake">Snowflake</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="alibaba">Alibaba</button>
                    </div>

                    <div class="sidebar-group">
                        <p class="sidebar-group-label">Topics</p>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="offers">Offers</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="cosell">Co-sell</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="integrations">Integrations</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="funding">Funding</button>
                    </div>

                    <div class="sidebar-group">
                        <p class="sidebar-group-label">Suger</p>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="suger">Suger</button>
                        <button class="sidebar-tag-btn" type="button" data-filter-tag="general">General</button>
                    </div>

                    <button class="sidebar-clear-btn" id="clearBtn" type="button">✕ Clear filters</button>

                    <a href="learning-paths/" class="sidebar-lp-link">Learning Paths →</a>
                </nav>
            </aside>

            <main class="content-main">
                <nav class="alpha-nav" aria-label="Jump to letter">
                    <div class="alpha-nav-inner" id="alpha-nav"></div>
                </nav>
                <div class="content-body">
                    <p class="count" id="count"></p>
                    <div id="list"></div>
                </div>
            </main>

            <aside class="sidebar-right" id="sidebarRight" aria-label="Term detail">
                <div class="sidebar-right-inner" id="sidebarRightInner"></div>
            </aside>
        </div>

        <button class="back-to-top" id="backToTop" type="button" aria-label="Back to top">↑ Top</button>

        <script type="module" src="main.js"></script>
    </body>
</html>
