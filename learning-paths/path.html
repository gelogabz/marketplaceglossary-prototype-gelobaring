<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loading path… — Cloud GTM Reference</title>
    <link rel="stylesheet" href="../styles.css" />
    <style>
        .topnav-links {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }

        .topnav-links a {
            font-size: 13px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            padding: 5px 10px;
            border-radius: 6px;
            transition: background 0.12s, color 0.12s;
        }

        .topnav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--white);
        }

        .topnav-links a.current { color: var(--orange); }

        /* ---- Page shell ---- */

        .path-outer {
            margin-top: var(--topnav-h);
            min-height: calc(100vh - var(--topnav-h));
            background: var(--bg);
            padding: 2.5rem 1.5rem 5rem;
        }

        .path-page {
            max-width: 760px;
            margin: 0 auto;
        }

        /* ---- Header ---- */

        .path-back {
            font-size: 12px;
            color: var(--gray-400);
            text-decoration: none;
            display: inline-block;
            margin-bottom: 1.5rem;
            transition: color 0.12s;
        }

        .path-back:hover { color: var(--orange-text); }

        .path-hdr-meta {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .level-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 3px 8px;
            border-radius: 99px;
            white-space: nowrap;
            text-transform: capitalize;
        }

        .l-beginner     { background: #e8f5e9; color: #2e7d32; }
        .l-intermediate { background: #fff3e0; color: #bf5600; }
        .l-advanced     { background: #fce4ec; color: #c62828; }

        .path-cat-label {
            font-size: 11px;
            color: var(--gray-400);
        }

        .path-hdr-title {
            font-family: "Lexend", sans-serif;
            font-size: 26px;
            font-weight: 700;
            color: var(--gray-900);
            letter-spacing: -0.03em;
            margin-bottom: 10px;
        }

        .path-hdr-desc {
            font-size: 15px;
            color: var(--gray-500);
            line-height: 1.6;
            margin-bottom: 8px;
            max-width: 600px;
        }

        .path-hdr-meta-text {
            font-size: 12px;
            color: var(--gray-400);
            margin-bottom: 2rem;
        }

        /* ---- Progress dots ---- */

        .path-progress {
            display: flex;
            gap: 8px;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .progress-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: var(--gray-200);
            border: none;
            padding: 0;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
        }

        .progress-dot:hover { transform: scale(1.35); }
        .progress-dot.active { background: var(--orange); transform: scale(1.2); }
        .progress-dot.done { background: var(--gray-300); }

        /* ---- Step sections ---- */

        .path-step {
            margin-bottom: 3.5rem;
            padding-bottom: 3.5rem;
            border-bottom: 1px solid var(--gray-100);
        }

        .path-step:last-child { border-bottom: none; }

        .step-counter {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--orange-text);
            margin-bottom: 10px;
        }

        .step-why-callout {
            font-size: 14px;
            color: var(--gray-500);
            line-height: 1.65;
            margin-bottom: 1.25rem;
            padding: 12px 16px;
            background: #fff8f4;
            border-left: 3px solid var(--orange);
            border-radius: 0 6px 6px 0;
        }

        /* ---- Path footer ---- */

        .path-footer {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 1px solid var(--gray-100);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .path-footer-link {
            font-size: 13px;
            color: var(--gray-400);
            text-decoration: none;
            transition: color 0.12s;
        }

        .path-footer-link:hover { color: var(--orange-text); }

        .path-next-link {
            font-size: 13px;
            font-weight: 600;
            color: var(--orange-text);
            text-decoration: none;
            transition: color 0.12s;
        }

        .path-next-link:hover { color: var(--orange); }

        /* ---- Not found ---- */

        .path-not-found {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--gray-400);
            font-size: 14px;
        }

        .path-not-found a {
            color: var(--orange-text);
            text-decoration: none;
        }

        /* ---- Completion ---- */

        .path-complete-btn {
            appearance: none;
            padding: 9px 20px;
            border-radius: 8px;
            border: 1.5px solid var(--orange);
            background: var(--white);
            color: var(--orange-text);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: background 0.12s, color 0.12s;
        }

        .path-complete-btn:hover {
            background: var(--orange);
            color: var(--white);
        }

        .path-complete-badge {
            font-size: 13px;
            font-weight: 600;
            color: #2e7d32;
        }

        .path-reset-btn {
            appearance: none;
            border: none;
            background: none;
            font-family: inherit;
            font-size: 12px;
            color: var(--gray-400);
            cursor: pointer;
            padding: 0;
            text-decoration: underline;
            text-underline-offset: 2px;
            transition: color 0.12s;
        }

        .path-reset-btn:hover { color: #c62828; }

        /* ---- Responsive ---- */

        @media (max-width: 767px) {
            .topnav-links { display: none; }
            .path-outer { padding: 1.5rem 1rem 4rem; }
            .path-hdr-title { font-size: 21px; }
            .step-why-callout { font-size: 13px; }
        }
    </style>
</head>
<body>

<nav class="topnav" aria-label="Site navigation">
    <div class="topnav-inner">
        <a href="../index.html" class="topnav-brand">SUGER<span class="brand-dot">.</span> Cloud GTM Reference</a>
        <div style="flex:1"></div>
        <div class="topnav-links">
            <a href="../index.html">Glossary</a>
            <a href="index.html" class="current">Learning Paths</a>
        </div>
    </div>
</nav>

<div class="path-outer">
    <div class="path-page" id="pathContent">
        <p style="color:var(--gray-400);font-size:14px;">Loading…</p>
    </div>
</div>

<script type="module" src="path.js"></script>

</body>
</html>
